services:
  # PostgreSQL Database (commented out - using Supabase cloud)
  # Uncomment if you want to use local PostgreSQL instead of Supabase
  # db:
  #   image: postgres:16-alpine
  #   container_name: banner_gangnam_db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-postgres}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  #     POSTGRES_DB: ${POSTGRES_DB:-banner_gangnam}
  #   ports:
  #     - "${DB_PORT:-5432}:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ./supabase/migrations:/docker-entrypoint-initdb.d
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - banner_network

  # Supabase (Optional - if you want to run Supabase locally)
  # Uncomment if you want to use local Supabase instead of cloud
  # supabase:
  #   image: supabase/postgres:15.1.0.117
  #   container_name: banner_gangnam_supabase
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-supabase}
  #   ports:
  #     - "54322:5432"
  #   volumes:
  #     - supabase_data:/var/lib/postgresql/data
  #   networks:
  #     - banner_network

  # Next.js Application (Frontend + Backend API)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_KAKAO_REST_API_KEY: ${NEXT_PUBLIC_KAKAO_REST_API_KEY}
        NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY: ${NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    container_name: banner_gangnam_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL}

      # Supabase
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

      # Kakao Map API
      NEXT_PUBLIC_KAKAO_REST_API_KEY: ${NEXT_PUBLIC_KAKAO_REST_API_KEY}
      NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY: ${NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY}

      # App Configuration
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    # depends_on:
    #   db:
    #     condition: service_healthy
    networks:
      - banner_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: banner_gangnam_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/webroot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - banner_network

  # Certbot for SSL certificate management (optional)
  # Uncomment to enable automatic SSL certificate renewal
  # certbot:
  #   image: certbot/certbot
  #   container_name: banner_gangnam_certbot
  #   volumes:
  #     - ./nginx/ssl:/etc/letsencrypt
  #     - ./nginx/webroot:/var/www/certbot
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
  #   depends_on:
  #     - nginx
  #   networks:
  #     - banner_network

volumes:
  postgres_data:
    driver: local
  # supabase_data:
  #   driver: local

networks:
  banner_network:
    driver: bridge
