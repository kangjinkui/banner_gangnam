events {
    worker_connections 1024;
}

http {
    upstream nextjs_app {
        server app:3000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Allow larger file uploads (for banner images)
    client_max_body_size 20M;

    # Catch all other HTTP requests (www, IP, etc)
    server {
        listen 80 default_server;
        server_name _;

        # Redirect to HTTPS
        return 301 https://hbc.ai.kr$request_uri;
    }

    # HTTPS configuration
    server {
        listen 443 ssl;
        http2 on;
        server_name hbc.ai.kr;

        # SSL certificates from Let's Encrypt
        ssl_certificate /etc/letsencrypt/live/hbc.ai.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hbc.ai.kr/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # SSL session caching
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

        # Proxy settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Health check endpoint
        location /api/health {
            proxy_pass http://nextjs_app;
        }

        # API routes with rate limiting
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://nextjs_app;
        }

        # Static files caching
        location /_next/static/ {
            proxy_pass http://nextjs_app;
            proxy_cache_valid 200 60m;
            add_header Cache-Control "public, immutable, max-age=31536000";
        }

        # All other requests
        location / {
            proxy_pass http://nextjs_app;
        }
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name hbc.ai.kr;
        return 301 https://$server_name$request_uri;
    }

    # Redirect www to non-www (HTTPS)
    server {
        listen 443 ssl;
        http2 on;
        server_name www.hbc.ai.kr;

        ssl_certificate /etc/letsencrypt/live/hbc.ai.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hbc.ai.kr/privkey.pem;

        return 301 https://hbc.ai.kr$request_uri;
    }
}
